services:
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    restart: always
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erpdb
    ports:
      - "5432:5432"
    volumes:
      - erp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erpdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  erp_pgdata:
